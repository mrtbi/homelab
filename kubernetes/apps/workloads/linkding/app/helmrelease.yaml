---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      linkding:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 33
            runAsGroup: 33
            fsGroup: 33
            fsGroupChangePolicy: "OnRootMismatch"
        initContainers:
          fspermissions:
            image:
              repository: docker.io/library/busybox
              tag: latest
            command: ['/bin/sh', '-c', 'chown -R 33:33 /etc/linkding/data']
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              readOnlyRootFilesystem: true
        containers:
          app:
            image:
              repository: ghcr.io/sissbruecker/linkding
              tag: 1.45.0-plus@sha256:d36c779808dd0980fc60a15167ca119b8be7f90debdd068fb038f227a87c106d
            env:
              LD_SUPERUSER_NAME:
                valueFrom:
                  secretKeyRef:
                    name: linkding-secret
                    key: username
              LD_SUPERUSER_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: linkding-secret
                    key: password
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    service:
      app:
        controller: linkding
        ports:
          http:
            port: &port 9090
    persistence:
      tmp:
        type: emptyDir
      data:
        annotations:
          k8up.io/backup: "true"
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /etc/linkding/data
    route:
      app:
        hostnames:
          - link.mrtb.io
        parentRefs:
          - name: gateway
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: linkding
                port: *port