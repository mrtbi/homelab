apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: linkding-cilium-policy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/controller: linkding
      app.kubernetes.io/instance: linkding
      app.kubernetes.io/name: linkding
  enableDefaultDeny:
    ingress: true
    egress: false
  ingress:
  - fromEndpoints:
      - matchLabels:
          app.kubernetes.io/component: proxy
          app.kubernetes.io/managed-by: envoy-gateway
          app.kubernetes.io/name: envoy
          gateway.envoyproxy.io/owning-gateway-name: gateway-internal
          gateway.envoyproxy.io/owning-gateway-namespace: network
          gateway.networking.k8s.io/gateway-name: gateway-internal
    toPorts:
      - ports:
        - port: "9090"
          protocol: TCP